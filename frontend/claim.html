<!DOCTYPE html>
<script>
    window.API_BASE = "http://localhost:4000";
</script>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claim - BlinkFind</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,100;0,9..144,300;0,9..144,400;1,9..144,300&display=swap" rel="stylesheet">
</head>
<body>
  <nav>
    <a href="home.html" class="nav-logo">BlinkFind</a>
    <input type="checkbox" id="menuToggle" class="menu-checkbox" aria-hidden="true">
    <label for="menuToggle" class="hamburger" aria-label="Menu" aria-haspopup="true" aria-expanded="false">
      <span></span><span></span><span></span>
    </label>
    <ul class="nav-links">
      <li><a href="home.html">Home</a></li>
      <li><a href="claim.html">Claim</a></li>
      <li><a href="report.html">Report</a></li>
      <li><a href="admin.html">Admin</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="#" onclick="logout()"><span>Logout</span></a></li>
    </ul>
  </nav>

  <main class="page-container">
    <div class="page-title">
      <h1>Find Your Lost Items</h1>
      <p>Browse through found items or search for something specific</p>
    </div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by item name, category, or location...">
      <select id="categoryFilter">
        <option value="">All Categories</option>
        <option value="Electronics">Electronics</option>
        <option value="Clothing">Clothing</option>
        <option value="Books">Books & Stationery</option>
        <option value="Accessories">Accessories</option>
        <option value="Sports">Sports Equipment</option>
        <option value="Personal">Personal Items</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div id="itemsContainer" class="items-grid">
      <div class="loading">Loading items...</div>
    </div>
  </main>

  <div class="modal" id="claimModal">
    <div class="modal-content">
      <button class="modal-close" id="closeModal">&times;</button>
      <h2>Claim This Item</h2>
      <div id="modalAlertContainer"></div>
      <form id="claimForm">
        <input type="hidden" id="claimItemId">
        <input type="hidden" id="claimItemName">
        <div class="form-group">
          <label for="claimantName">Your Name *</label>
          <input type="text" id="claimantName" required placeholder="Your full name">
        </div>
        <div class="form-group">
          <label for="claimantEmail">Your Email *</label>
          <input type="email" id="claimantEmail" required placeholder="your.email@school.edu">
        </div>
        <div class="form-group">
          <label for="claimDescription">Proof of Ownership *</label>
          <textarea id="claimDescription" required placeholder="Describe specific details that prove this item belongs to you"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit Claim</button>
      </form>
    </div>
  </div>

  <footer>
    <div class="footer-left">© 2026 PA FBLA All rights reserved.</div>
    <div class="footer-logo">BlinkFind<span>.</span></div>
    <div class="footer-right">Built by <span style="color:var(--accent)">Rutviij</span> Casula</div>
  </footer>

  <script src="auth.js"></script>
  <script src="claim.js"></script>
</body>
</html>
