<!DOCTYPE html>
<script>
 window.API_BASE = "http://localhost:4000";
</script>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlinkFind - Login</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,100;0,9..144,300;0,9..144,400;1,9..144,300&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
 </head>
 <body>

<!-- Login Section -->
<div class="login-container">
  <div class="login-box">
    <!-- Page Title -->
    <h1 class="login-title">Login</h1>

    <!-- Error Message (hidden until login fails via JS) -->
    <div class="login-error" id="loginError">
      <i class="fas fa-exclamation-circle"></i> Invalid username or password.
    </div>

    <!-- Login Form -->
    <form id="loginForm">
      <!-- Username Field -->
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" autocomplete="username" required>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>

      <!-- Remember Me + Forgot Password -->
      <div class="remember-forgot">
        <label>
          <input type="checkbox" id="rememberMe"> Remember me
        </label>
        <a href="#" id="forgotPassword">Forgot password?</a>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="login-button">Login</button>
    </form>

    <!-- Demo Credentials -->
    <p class="hint">Demo Credentials: <b>admin / school123</b> or <b>guest / guest</b></p>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-left">© 2026 PA FBLA All rights reserved.</div>
  <div class="footer-logo">BlinkFind<span>.</span></div>
  <div class="footer-right">Built by <span style="color:var(--accent)">Rutviij</span> Casula</div>
</footer>

<!-- External JavaScript Files -->
<script src="login.js"></script>
 </body>
</html>
